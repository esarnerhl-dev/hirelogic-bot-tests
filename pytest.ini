[pytest]
# Default options for all test runs
addopts =
    -v
    --tb=short
    --strict-markers
    --timeout=600

# Test discovery
testpaths = tests

# Markers
markers =
    zoom: Zoom platform tests
    google_meet: Google Meet platform tests
    teams: Microsoft Teams platform tests
    edge_case: Edge case and robustness scenarios
    slow: Tests that take more than 5 minutes

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_file = reports/test.log
log_file_level = DEBUG

# Timeout (seconds) per test — prevents runaway tests
timeout = 600
