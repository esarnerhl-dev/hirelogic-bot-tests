name: HireLogic Bot Integration Tests

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_filter:
        description: "Run only tests matching this name (e.g. 'join')"
        required: false
        default: ""

env:
  PYTHON_VERSION: "3.11"

jobs:
  test-zoom:
    name: Zoom Tests
    runs-on: ubuntu-latest
    env:
      HIRELOGIC_BOT_EMAIL: ${{ secrets.HIRELOGIC_BOT_EMAIL }}
      ZOOM_ACCOUNT_ID: ${{ secrets.ZOOM_ACCOUNT_ID }}
      ZOOM_CLIENT_ID: ${{ secrets.ZOOM_CLIENT_ID }}
      ZOOM_CLIENT_SECRET: ${{ secrets.ZOOM_CLIENT_SECRET }}
      ZOOM_HOST_EMAIL: ${{ secrets.ZOOM_HOST_EMAIL }}
      ZOOM_RECURRING_URL: ${{ secrets.ZOOM_RECURRING_URL }}
      ZOOM_RECURRING_MEETING_ID: ${{ secrets.ZOOM_RECURRING_MEETING_ID }}
      OUTLOOK_EMAIL: ${{ secrets.OUTLOOK_EMAIL }}
      OUTLOOK_PASSWORD: ${{ secrets.OUTLOOK_PASSWORD }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y pulseaudio pulseaudio-utils
          pulseaudio --start --exit-idle-time=-1
          sleep 2

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Run Zoom join test
        timeout-minutes: 10
        run: |
          ARGS="tests/test_zoom.py::TestZoomBotJoin::test_bot_joins_within_sla -v --tb=short -s"
          if [ -n "${{ github.event.inputs.test_filter }}" ]; then
            ARGS="tests/test_zoom.py -v --tb=short -s -k '${{ github.event.inputs.test_filter }}'"
          fi
          pytest $ARGS

      - name: Upload test log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zoom-test-log
          path: reports/
          retention-days: 30

  report:
    name: Post Result Summary
    runs-on: ubuntu-latest
    needs: [test-zoom]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## 🤖 HireLogic Bot Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.test-zoom.result }}" = "success" ]; then
            echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
            echo "| Zoom | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
            echo "| Zoom | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi
